<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>泼茶管理台 · Pending Approval</title>
<style>
  :root {
    --paper: #FDF8EF;
    --paper-2: #F7F2E5;
    --ink: #3A2E1B;
    --ink-2: #6E5535;
    --tea: #8B6F47;
    --tea-3: #6E5535;
    --pine: #4A6B4A;
    --warn: #B85B3A;
    --line: #E2D8C2;
  }
  * { box-sizing: border-box; }
  body {
    margin:0; padding:32px;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
  }
  header {
    display:flex; justify-content:space-between; align-items:center;
    padding-bottom:16px; border-bottom:1px solid var(--line); margin-bottom:24px;
  }
  h1 { font-family: 'Songti SC','STSong',serif; font-size:24px; margin:0; letter-spacing:.04em; color:var(--tea-3); }
  .pending-count { font-size:13px; color:var(--ink-2); }
  .pending-count b { color: var(--warn); font-size:18px; }
  .token-bar { display:flex; gap:8px; }
  .token-bar input {
    padding:6px 10px; border:1px solid var(--line); border-radius:6px;
    font-family: monospace; font-size:12px; min-width:280px; background:#fff;
  }
  .token-bar button {
    padding:6px 14px; border:none; background:var(--tea-3); color:#fff;
    border-radius:6px; cursor:pointer; font-size:12px;
  }
  .grid {
    display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap:16px;
  }
  .card {
    background: var(--paper-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px;
    position:relative;
  }
  .card .title {
    font-family: 'Songti SC','STSong',serif;
    font-size:18px; font-weight:600;
    color: var(--tea-3); margin-bottom:8px;
  }
  .card .excerpt {
    font-size:13px; line-height:1.85;
    color: var(--ink); margin:8px 0 14px;
    white-space:pre-wrap;
  }
  .card .meta { font-size:12px; color: var(--ink-2); line-height:1.8; }
  .card .meta b { color: var(--ink); font-weight:600; }
  .tags { margin-top:8px; }
  .tag {
    display:inline-block; padding:1px 8px; margin:2px;
    background:#fff; border:1px solid var(--line); border-radius:99px;
    font-size:11px; color:var(--ink-2);
  }
  .mood-dot {
    display:inline-block; width:10px; height:10px; border-radius:50%;
    margin-right:6px; vertical-align:middle;
  }
  .mood-blue   { background:#B5C9D9; }
  .mood-pink   { background:#E9C8C8; }
  .mood-yellow { background:#E9D9A8; }
  .mood-green  { background:#B6CAB0; }
  .mood-purple { background:#C9B8D4; }
  .actions { display:flex; gap:8px; margin-top:14px; }
  .actions button {
    flex:1; padding:8px 0; border:none; border-radius:6px;
    cursor:pointer; font-size:13px; font-weight:600;
  }
  .btn-ok { background: var(--pine); color:#fff; }
  .btn-no { background: var(--warn); color:#fff; }
  .empty {
    text-align:center; padding:80px 20px; color: var(--ink-2);
    font-family: 'Songti SC','STSong',serif; font-size:16px;
  }
  .toast {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--ink); color:#fff;
    padding:10px 22px; border-radius:99px;
    font-size:13px; transition:transform .3s;
    z-index:1000;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .helper {
    margin:24px 0; padding:12px 16px;
    background: var(--paper-2); border:1px dashed var(--line);
    border-radius:8px; font-size:12px; color: var(--ink-2);
    line-height:1.8;
  }
</style>
</head>
<body>

<header>
  <h1>泼茶管理台 · 待审核</h1>
  <div class="pending-count">待处理 <b id="cnt">…</b> 条</div>
  <div class="token-bar">
    <input type="password" id="adminToken" placeholder="贴入 ADMIN_TOKEN">
    <button id="btnLoad">刷新</button>
  </div>
</header>

<div class="helper" id="helper">
  贴入 ADMIN_TOKEN 后点刷新；通过后状态 → live 并显示在前台墙上；拒绝后纸条永久隐藏；当晚 22:30 自动同步通过的纸条到钉钉 hERWDMS。
</div>

<div class="grid" id="grid">
  <div class="empty">先贴入 token 并点刷新</div>
</div>

<div class="toast" id="toast">已操作</div>

<script>
let TOKEN = sessionStorage.getItem('poucha_admin_token') || '';
const tokenInput = document.getElementById('adminToken');
tokenInput.value = TOKEN;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__tt);
  window.__tt = setTimeout(() => t.classList.remove('show'), 2000);
}

function esc(s){ return String(s||'').replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

async function apiPending() {
  const res = await fetch('/api/admin/pending', {
    headers: { 'Authorization': 'Bearer ' + TOKEN }
  });
  if (!res.ok) return { error: res.status === 403 ? 'token 无效' : 'HTTP ' + res.status };
  return await res.json();
}

async function apiAction(path, id) {
  const res = await fetch('/api/admin/' + path, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  return res.ok;
}

function renderCards(list) {
  document.getElementById('cnt').textContent = list.length;
  const g = document.getElementById('grid');
  if (list.length === 0) {
    g.innerHTML = '<div class="empty">暂无待审核 · 喝口茶吧 ☕</div>';
    return;
  }
  g.innerHTML = list.map(f => `
    <div class="card" data-id="${f.id}">
      <div class="title"><span class="mood-dot mood-${f.mood||'blue'}"></span>${esc(f.title)}</div>
      <div class="excerpt">${esc(f.excerpt)}</div>
      <div class="meta">
        <b>${esc(f.pen_name)}</b>${f.mbti ? ' · ' + esc(f.mbti) : ''}<br>
        ${f.source ? '出处：' + esc(f.source) + '<br>' : ''}
        允许认领：${f.allow_claim ? '✅' : '❌'} · 投递于 ${(f.created_at||'').slice(0,16).replace('T',' ')}
      </div>
      <div class="tags">${(f.tags||[]).map(t=>'<span class="tag">#'+esc(t)+'</span>').join('')}</div>
      <div class="actions">
        <button class="btn-ok" data-act="approve" data-id="${f.id}">通过</button>
        <button class="btn-no" data-act="reject"  data-id="${f.id}">拒绝</button>
      </div>
    </div>
  `).join('');

  g.querySelectorAll('button[data-act]').forEach(b => {
    b.addEventListener('click', async () => {
      const id = b.dataset.id, act = b.dataset.act;
      b.disabled = true; b.textContent = '处理中…';
      const ok = await apiAction(act, id);
      if (ok) {
        showToast(act === 'approve' ? '已上墙 ✓' : '已拒绝');
        document.querySelector(`.card[data-id="${id}"]`)?.remove();
        document.getElementById('cnt').textContent = document.querySelectorAll('.card').length;
        if (document.querySelectorAll('.card').length === 0) {
          document.getElementById('grid').innerHTML = '<div class="empty">暂无待审核 · 喝口茶吧 ☕</div>';
        }
      } else {
        showToast('操作失败');
        b.disabled = false; b.textContent = act === 'approve' ? '通过' : '拒绝';
      }
    });
  });
}

async function reload() {
  TOKEN = tokenInput.value.trim();
  if (!TOKEN) { showToast('先贴 token'); return; }
  sessionStorage.setItem('poucha_admin_token', TOKEN);
  const r = await apiPending();
  if (r.error) { showToast(r.error); return; }
  renderCards(r.feathers || []);
}

document.getElementById('btnLoad').addEventListener('click', reload);
tokenInput.addEventListener('keypress', e => { if (e.key === 'Enter') reload(); });
if (TOKEN) reload();
</script>
</body>
</html>
